services:
  postgres:
    image: postgres:16
    container_name: bir-yuva-bir-dost-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bir_yuva_bir_dost
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bir_yuva_bir_dost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
